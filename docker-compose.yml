version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DATABASE_URL: postgresql://rag:rag@db:5432/rag
      API_KEY: ${API_KEY:-dev-key}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount local model cache so Docker doesn't re-download on every build
      - huggingface_cache:/root/.cache/huggingface

volumes:
  pgdata:
  huggingface_cache:
